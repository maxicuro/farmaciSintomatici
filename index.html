<!DOCTYPE html><html lang="it"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Log Farmaci</title><style>*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}body{font-family:Arial,sans-serif;font-size:14px;background:#f0f2f5;color:#222}.header{background:#4A235A;color:#fff;padding:12px 20px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}.main{max-width:1080px;margin:0 auto;padding:14px}.card{background:#fff;border:1px solid #dde;border-radius:8px;padding:14px;margin-bottom:10px}.card h2{font-size:12px;font-weight:700;color:#666;text-transform:uppercase;margin-bottom:10px}button{font-family:inherit;font-size:13px;padding:5px 12px;border:1px solid #ccc;border-radius:6px;cursor:pointer;background:#fff;color:#333}button:disabled{opacity:.45}.btn-primary{background:#4A235A;color:#fff;border-color:#4A235A}.btn-green{background:#1E8449;color:#fff;border-color:#1E8449}input,select,textarea{width:100%;padding:6px 9px;border:1px solid #ccc;border-radius:6px;font-family:inherit;font-size:13px}.lbl{font-size:12px;color:#666;display:block;margin-bottom:3px;margin-top:8px}.g2{display:grid;grid-template-columns:1fr 1fr;gap:0 14px}.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:0 14px}.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:10px}.stat{background:#fff;border:1px solid #dde;border-radius:8px;padding:12px;text-align:center}.stat .val{font-size:26px;font-weight:700;margin-bottom:2px}.stat .lbl2{font-size:11px;color:#888}table{width:100%;border-collapse:collapse;font-size:13px}th{background:#f5f5f7;text-align:left;padding:7px 10px;font-size:11px;font-weight:700;color:#666;text-transform:uppercase;border-bottom:2px solid #eee;white-space:nowrap}td{padding:7px 10px;border-bottom:1px solid #f0f0f0;vertical-align:middle}tr:hover td{background:#fafafa}.dot{width:9px;height:9px;border-radius:50%;display:inline-block;margin-right:5px;vertical-align:middle}.pain-bar{display:flex;align-items:center;gap:3px}.pain-seg{height:10px;border-radius:2px;flex:1;min-width:7px;max-width:12px}.empty{text-align:center;color:#aaa;padding:28px}.msg{padding:8px 12px;border-radius:6px;font-size:12px;margin-bottom:8px}.msg.ok{background:#D4EDDA;color:#155724}.msg.err{background:#f8d7da;color:#721c24}.msg.info{background:#d1ecf1;color:#0c5460}.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:100;align-items:center;justify-content:center}.modal-bg.open{display:flex}.modal{background:#fff;border-radius:10px;padding:20px;width:460px;max-width:96vw;max-height:90vh;overflow-y:auto;box-shadow:0 8px 32px rgba(0,0,0,.18)}.mfooter{display:flex;gap:8px;margin-top:14px;justify-content:flex-end}#chartWrap{position:relative;width:100%;height:200px}.filter-bar{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:8px}.filter-bar select{width:auto}@media(max-width:600px){.stat-grid{grid-template-columns:1fr 1fr}.g3{grid-template-columns:1fr 1fr}}</style></head><body><div class="header"><div><div style="font-size:16px;font-weight:600">Log Farmaci Sintomatici</div><div style="font-size:12px;opacity:.75">Scali Massimo - 06/10/1963 - Imola</div></div><div style="display:flex;gap:8px;flex-wrap:wrap"><button class="btn-green" onclick="syncFromGitHub()" id="btnSync">Aggiorna</button><button class="btn-primary" onclick="openModal()">+ Aggiungi</button></div></div><div class="main"><div class="stat-grid" id="stats"></div><div id="msg" style="display:none"></div><div class="card"><h2>Frequenza mensile</h2><div id="chartWrap"><canvas id="chart"></canvas></div></div><div class="card"><h2>Registro assunzioni</h2><div class="filter-bar"><select id="fFarm" onchange="renderTable()"><option value="">Tutti i farmaci</option></select><select id="fMesi" onchange="renderTable()"><option value="">Tutto</option><option value="3">Ultimi 3 mesi</option><option value="6">Ultimi 6 mesi</option><option value="12">Ultimo anno</option></select><span id="countLbl" style="font-size:12px;color:#888;margin-left:auto"></span></div><div style="overflow-x:auto"><table><thead><tr><th>Data</th><th>Ora</th><th>Farmaco</th><th>Dosaggio</th><th>Dolore</th><th>Tipo sintomo</th><th>Note</th><th>Efficacia</th></tr></thead><tbody id="tbody"></tbody></table></div></div></div><div class="modal-bg" id="modalBg" onclick="if(event.target===this)closeModal()"><div class="modal"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px"><strong style="font-size:15px">Nuova assunzione</strong><button onclick="closeModal()" style="border:none;background:none;font-size:22px;cursor:pointer;color:#888">X</button></div><div class="g2"><div><label class="lbl">Data *</label><input id="m_data" type="date"></div><div><label class="lbl">Ora</label><input id="m_ora" type="time"></div></div><div class="g3"><div><label class="lbl">Farmaco *</label><select id="m_farm" onchange="fillDose()"><option>Maxalt RPD</option><option>Oki</option><option>Indoxen</option><option>Voltaren</option><option>Tachipirina</option><option>Ibuprofene</option><option>Altro</option></select></div><div><label class="lbl">Dosaggio</label><input id="m_dose" type="text"></div><div><label class="lbl">Dolore 1-10</label><input id="m_pain" type="number" min="1" max="10"></div></div><div class="g2"><div><label class="lbl">Tipo sintomo</label><select id="m_tipo"><option>Emicrania</option><option>Cefalea tensiva</option><option>Cefalea post-sforzo</option><option>Lombocruralgia</option><option>Cervicalgia</option><option>Dolore articolare</option><option>Altro</option></select></div><div><label class="lbl">Efficacia</label><select id="m_eff"><option value="buona">Buona</option><option value="parziale">Parziale</option><option value="nessuna">Nessuna</option><option value="">Non valutata</option></select></div></div><label class="lbl">Note</label><textarea id="m_note" style="height:52px"></textarea><div id="merr" style="font-size:12px;color:#A32D2D;margin-top:6px;min-height:16px"></div><div class="mfooter"><button onclick="closeModal()">Annulla</button><button class="btn-primary" onclick="salva()">Salva</button></div></div></div><script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script><script>var RAW="https://raw.githubusercontent.com/maxicuro/farmaciSintomatici/main/log_data.json";var LOG=[],chartInst=null;var DOSES={"Maxalt RPD":"10mg","Oki":"80mg","Indoxen":"25mg","Voltaren":"50mg","Tachipirina":"1000mg","Ibuprofene":"400mg"};var FCOL={"Maxalt RPD":"#534AB7","Oki":"#D85A30","Indoxen":"#BA7517","Voltaren":"#185FA5","Tachipirina":"#0F6E56","Ibuprofene":"#3B6D11","Altro":"#888"};var EFF_L={buona:"Buona",parziale:"Parziale",nessuna:"Nessuna","":"---"};var EFF_C={buona:"#1E8449",parziale:"#854F0B",nessuna:"#A32D2D","":"#aaa"};function colF(n){return FCOL[n]||"#888";}function fmtD(s){if(!s)return"";return new Date(s+"T00:00:00").toLocaleDateString("it-IT",{day:"2-digit",month:"2-digit",year:"numeric"});}function pcol(v){if(!v)return"#ccc";if(v<=3)return"#1E8449";if(v<=6)return"#BA7517";return"#A32D2D";}function pbar(v){if(!v)return"---";var s="";for(var i=1;i<=10;i++)s+="<div class=pain-seg style=background:"+(i<=v?pcol(v):"#eee")+"></div>";return"<div class=pain-bar>"+s+"<span style=font-size:12px;font-weight:700;color:"+pcol(v)+"> "+v+"</span></div>";}function uid(){return"s"+Date.now().toString(36)+Math.random().toString(36).slice(2,5);}function today(){return new Date().toISOString().split("T")[0];}function showMsg(t,x){var d=document.getElementById("msg");d.className="msg "+t;d.textContent=x;d.style.display="block";if(t==="ok")setTimeout(function(){d.style.display="none";},4000);}function syncFromGitHub(){var b=document.getElementById("btnSync");b.disabled=true;b.textContent="...";showMsg("info","Caricamento...");fetch(RAW+"?t="+Date.now()).then(function(r){if(!r.ok)throw new Error("HTTP "+r.status);return r.json();}).then(function(data){LOG=data.sort(function(a,b){return b.data.localeCompare(a.data)||(b.ora||"").localeCompare(a.ora||"");});showMsg("ok","Aggiornato - "+LOG.length+" assunzioni.");b.disabled=false;b.textContent="Aggiorna";render();}).catch(function(e){showMsg("err","Errore: "+e.message);b.disabled=false;b.textContent="Aggiorna";});}function renderStats(){var now=new Date(),mk=now.getFullYear()+"-"+(now.getMonth()<9?"0":"")+(now.getMonth()+1);var tm=LOG.filter(function(r){return r.data.startsWith(mk);}),mx=LOG.filter(function(r){return r.farmaco==="Maxalt RPD";});var pp=LOG.map(function(r){return r.livelloDolore;}).filter(Boolean);var ap=pp.length?(pp.reduce(function(a,b){return a+b;},0)/pp.length).toFixed(1):"---";var mt={};LOG.forEach(function(r){var m=r.data.slice(0,7);mt[m]=(mt[m]||0)+1;});var mv=Object.values(mt),am=mv.length?(mv.reduce(function(a,b){return a+b;},0)/mv.length).toFixed(1):"---";function s(v,l,c){return"<div class=stat><div class=val style=color:"+c+">"+v+"</div><div class=lbl2>"+l+"</div></div>";}document.getElementById("stats").innerHTML=s(tm.length,"Questo mese","#4A235A")+s(mx.length,"Maxalt totali","#534AB7")+s(ap,"Dolore medio","#D85A30")+s(am,"Media/mese","#185FA5");}function renderTable(){var ff=document.getElementById("fFarm").value,fm=parseInt(document.getElementById("fMesi").value)||0,data=LOG.slice();if(ff)data=data.filter(function(r){return r.farmaco===ff;});if(fm){var cut=new Date();cut.setMonth(cut.getMonth()-fm);var cs=cut.toISOString().split("T")[0];data=data.filter(function(r){return r.data>=cs;});}document.getElementById("countLbl").textContent=data.length+" assunzioni";var tb=document.getElementById("tbody");if(!data.length){tb.innerHTML="<tr><td colspan=8 class=empty>Nessun dato. Clicca Aggiorna.</td></tr>";return;}tb.innerHTML=data.map(function(r){return"<tr><td style=white-space:nowrap>"+fmtD(r.data)+"</td><td style=color:#888>"+(r.ora||"---")+"</td><td><span class=dot style=background:"+colF(r.farmaco)+"></span>"+r.farmaco+"</td><td style=color:#666>"+(r.dosaggio||"---")+"</td><td>"+pbar(r.livelloDolore)+"</td><td style=color:#555>"+(r.tipoSintomo||"---")+"</td><td style=color:#777;font-size:12px>"+(r.note||"---")+"</td><td style=white-space:nowrap;color:"+EFF_C[r.efficacia||""]+">"+EFF_L[r.efficacia||""]+"</td></tr>";}).join("");}function renderChart(){var now=new Date(),months=[],labels=[];for(var i=11;i>=0;i--){var d=new Date(now.getFullYear(),now.getMonth()-i,1);var mk=d.getFullYear()+"-"+(d.getMonth()<9?"0":"")+(d.getMonth()+1);months.push(mk);labels.push(["gen","feb","mar","apr","mag","giu","lug","ago","set","ott","nov","dic"][d.getMonth()]+"26"+String(d.getFullYear()).slice(2));}var used=[];LOG.forEach(function(r){if(used.indexOf(r.farmaco)<0)used.push(r.farmaco);});var ds=used.map(function(n){var c=colF(n);return{label:n,data:months.map(function(m){return LOG.filter(function(r){return r.farmaco===n&&r.data.startsWith(m);}).length;}),backgroundColor:c+"99",borderColor:c,borderWidth:1.5};});if(chartInst){chartInst.destroy();chartInst=null;}if(!ds.length)return;chartInst=new Chart(document.getElementById("chart"),{type:"bar",data:{labels:labels,datasets:ds},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:used.length>1,position:"bottom",labels:{font:{size:11},boxWidth:12}}},scales:{x:{stacked:true,ticks:{autoSkip:false,maxRotation:45,font:{size:10}}},y:{stacked:true,beginAtZero:true,ticks:{stepSize:1,precision:0}}}}});}function render(){renderStats();renderTable();renderChart();}function openModal(){document.getElementById("merr").textContent="";document.getElementById("m_data").value=today();document.getElementById("m_ora").value="";document.getElementById("m_farm").value="Maxalt RPD";fillDose();document.getElementById("m_pain").value="";document.getElementById("m_tipo").value="Emicrania";document.getElementById("m_eff").value="buona";document.getElementById("m_note").value="";document.getElementById("modalBg").classList.add("open");}function closeModal(){document.getElementById("modalBg").classList.remove("open");}function fillDose(){var n=document.getElementById("m_farm").value;if(DOSES[n])document.getElementById("m_dose").value=DOSES[n];}function salva(){var dt=document.getElementById("m_data").value;if(!dt){document.getElementById("merr").textContent="Inserire la data.";return;}var e={id:uid(),data:dt,ora:document.getElementById("m_ora").value||"",farmaco:document.getElementById("m_farm").value,dosaggio:document.getElementById("m_dose").value.trim(),livelloDolore:parseInt(document.getElementById("m_pain").value)||null,tipoSintomo:document.getElementById("m_tipo").value,efficacia:document.getElementById("m_eff").value,note:document.getElementById("m_note").value.trim()};LOG.push(e);LOG.sort(function(a,b){return b.data.localeCompare(a.data);});closeModal();render();showMsg("ok","Voce aggiunta. Sara sincronizzata da Claude.");}var ff=document.getElementById("fFarm");["Maxalt RPD","Oki","Indoxen","Voltaren","Tachipirina","Ibuprofene","Altro"].forEach(function(n){var o=document.createElement("option");o.value=n;o.textContent=n;ff.appendChild(o);});document.addEventListener("keydown",function(e){if(e.key==="Escape")closeModal();});window.addEventListener("resize",function(){if(chartInst)chartInst.resize();});syncFromGitHub();</script></body></html>
